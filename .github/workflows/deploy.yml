# ============================================
# GITHUB ACTIONS - CI/CD PIPELINE
# File location: .github/workflows/deploy.yml
# ============================================
# This runs automatically every time you do "git push"
# It will: Test your code → Deploy to GitHub Pages

name: CI/CD Pipeline - Test & Deploy

on:
  push:
    branches: [ main ]      # Runs when you push to main branch
  pull_request:
    branches: [ main ]      # Also runs for pull requests

jobs:

  # ─── JOB 1: TEST & LINT ───
  test:
    name: Run Tests & Check Code
    runs-on: ubuntu-latest   # Uses a fresh Linux computer in the cloud

    steps:
      # Step 1: Download your code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm install

      # Step 4: Run tests
      - name: Run tests
        run: npm test

      # Step 5: Check HTML is valid
      - name: Validate HTML file exists
        run: |
          if [ -f "index.html" ]; then
            echo "✅ index.html found!"
          else
            echo "❌ index.html missing!" && exit 1
          fi

      # Step 6: Check server.js exists
      - name: Validate server.js exists
        run: |
          if [ -f "server.js" ]; then
            echo "✅ server.js found!"
          else
            echo "❌ server.js missing!" && exit 1
          fi

      - name: Pipeline check complete
        run: echo "✅ All checks passed! Ready to deploy."

  # ─── JOB 2: DEPLOY TO GITHUB PAGES ───
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: test           # Only deploy if tests passed
    if: github.ref == 'refs/heads/main'   # Only deploy from main branch

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload website files
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'    # Uploads everything in your repo root

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment complete!
        run: echo "🎉 Website deployed! Check your GitHub Pages URL."
